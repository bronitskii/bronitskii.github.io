<!doctype html>
<html>
    <head>
        <link
            rel="shortcut icon"
            type="image/x-icon"
            href="images/favicon.ico"
        />
        <title>404 - File Not Found</title>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, user-scalable=no"
        />
        <link rel="stylesheet" href="assets/css/main.css" />
        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                background: #000;
                overflow: hidden;
            }
            #wrapper {
                position: relative;
                transform: none;
                top: auto;
            }
            article {
                opacity: 1 !important;
                display: block !important;
                border: none !important;
                padding: 1rem !important;
                background: transparent;
                box-shadow: none !important;
                width: auto !important;
            }
            .error-code {
                font-size: 6rem;
                color: #d83030;
                font-family: monospace;
                margin: 0.5rem 0;
                text-shadow: 0 0 15px rgba(216, 48, 48, 0.4);
                line-height: 1;
                cursor: default;
                position: relative;
                user-select: none;
            }
            .error-message {
                font-family: monospace;
                color: #777;
                font-size: 0.9rem;
                margin-bottom: 1.5rem;
                line-height: 1.4;
            }
            .error-message p {
                margin: 0.2rem 0;
            }
            .home-link {
                color: #fff;
                text-decoration: none;
                font-family: monospace;
                border: 1px solid #d8303011;
                padding: 0.3rem 0.7rem;
                font-size: 0.8rem;
                transition: all 0.3s ease;
            }
            .home-link:hover {
                color: #d83030fc;
            }

            @keyframes glitch-anim {
                0% {
                    clip-path: inset(40% 0 61% 0);
                    transform: translate(-2px, -2px);
                }
                10% {
                    clip-path: inset(92% 0 1% 0);
                    transform: translate(1px, 2px);
                }
                20% {
                    clip-path: inset(25% 0 58% 0);
                    transform: translate(-1px, -3px);
                }
                30% {
                    clip-path: inset(75% 0 7% 0);
                    transform: translate(2px, 1px);
                }
                40% {
                    clip-path: inset(15% 0 83% 0);
                    transform: translate(-2px, 2px);
                }
                50% {
                    clip-path: inset(58% 0 43% 0);
                    transform: translate(1px, -2px);
                }
                60% {
                    clip-path: inset(3% 0 95% 0);
                    transform: translate(-1px, 1px);
                }
                70% {
                    clip-path: inset(82% 0 15% 0);
                    transform: translate(2px, -1px);
                }
                80% {
                    clip-path: inset(45% 0 35% 0);
                    transform: translate(-2px, 2px);
                }
                90% {
                    clip-path: inset(12% 0 85% 0);
                    transform: translate(1px, -2px);
                }
                100% {
                    clip-path: inset(40% 0 61% 0);
                    transform: translate(0);
                }
            }

            .error-code::before,
            .error-code::after {
                content: attr(data-value);
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                opacity: 0.8;
            }

            .error-code::before {
                color: ghostwhite;
                z-index: -1;
                animation: glitch-anim 2s infinite linear alternate-reverse;
            }

            .error-code::after {
                color: powderblue;
                z-index: -2;
                animation: glitch-anim 3s infinite linear alternate-reverse;
            }
        </style>
    </head>
    <body class="is-preload">
        <div id="wrapper">
            <article id="404">
                <nav class="breadcrumbs">
                    <div>
                        <span
                            onclick="location.href = 'index.html'"
                            style="cursor: pointer"
                            >[v:~]$</span
                        >
                        <span class="slash">cat</span>
                        <span id="path-display" style="color: #999"
                            >bronitskii.work/</span
                        >
                    </div>
                </nav>
                <div style="text-align: center; margin-top: 2rem">
                    <div class="error-code" data-value="404">404</div>
                    <div class="error-message">
                        <p>-- not found --</p>
                        <p>Better luck next time</p>
                    </div>
                    <a href="index.html" class="home-link">[ TRY AGAIN ]</a>
                </div>
            </article>
        </div>
        <script src="assets/js/jquery.min.js"></script>
        <script src="assets/js/browser.min.js"></script>
        <script src="assets/js/breakpoints.min.js"></script>
        <script src="assets/js/util.js"></script>
        <script>
            $(function () {
                setTimeout(function () {
                    $("body").removeClass("is-preload");
                }, 100);

                const pathDisplay = document.getElementById("path-display");
                let path = window.location.pathname;
                if (
                    path === "/" ||
                    path.endsWith("index.html") ||
                    path.endsWith("404.html")
                ) {
                    path = "/requested-resource";
                }
                pathDisplay.textContent = "bronitskii.work" + path;

                const letters = "0123456789";
                const errorCode = document.querySelector(".error-code");

                setInterval(() => {
                    let iteration = 0;
                    const interval = setInterval(() => {
                        errorCode.innerText = errorCode.innerText
                            .split("")
                            .map((letter, index) => {
                                if (index < iteration) {
                                    return errorCode.dataset.value[index];
                                }
                                return letters[
                                    Math.floor(Math.random() * letters.length)
                                ];
                            })
                            .join("");

                        if (iteration >= errorCode.dataset.value.length) {
                            clearInterval(interval);
                        }

                        iteration += 1 / 3;
                    }, 50);
                }, 4000);
            });
        </script>
    </body>
</html>
